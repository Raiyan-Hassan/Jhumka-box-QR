<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Nutella Bread 😋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; overflow: hidden; font-family: 'Inter', sans-serif; height: 100vh; width: 100vw; }
        
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--duration) infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .poem-text {
            font-family: 'Playfair Display', serif;
            text-shadow: 0 0 10px rgba(255,182,193,0.8);
            animation: glow 3s ease-in-out infinite alternate;
            line-height: 1.6;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #ffb6c1, 0 0 5px #ff1493; }
            to { text-shadow: 0 0 20px #ffb6c1, 0 0 30px #ff69b4; }
        }

        .step { display: none; height: 100vh; width: 100vw; padding: 20px; }
        .step.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        video, .camera-box { 
            width: 90vw; 
            max-width: 400px; 
            border-radius: 1.5rem; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            background: black;
        }
        .camera-box { height: 55vh; object-fit: cover; transform: scaleX(-1); border: 3px solid #f472b6; }
        
        .btn-glow {
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
        }
    </style>
</head>
<body>

    <div class="stars-container" id="star-field"></div>

    <section id="step1" class="step active">
        <div class="w-64 h-64 mb-10 rounded-3xl overflow-hidden border-2 border-pink-500/30 shadow-2xl">
            <img src="cat.jpg" alt="Cat" class="w-full h-full object-cover">
        </div>
        <button onclick="nextStep(2)" class="btn-glow bg-gradient-to-r from-pink-500 to-rose-600 px-8 py-4 rounded-full font-bold text-lg active:scale-95 transition-all">
            shall we start, nutella bread? 😋
        </button>
    </section>

    <section id="step2" class="step">
        <div class="relative inline-block">
            <video id="usVideo" src="us.mp4" playsinline preload="auto"></video>
            <img src="me.png" class="absolute -bottom-4 -right-4 w-20 animate-bounce" alt="Me">
        </div>
        <div id="videoNextBtn" class="hidden mt-10">
            <button onclick="requestCamera()" class="text-pink-400 font-bold text-xl animate-pulse tracking-wide">
                wanna see what I will do?
            </button>
        </div>
    </section>

    <section id="step3" class="step">
        <video id="camFeed" class="camera-box" autoplay playsinline></video>
        <button onclick="nextStep(4)" class="mt-10 border-2 border-pink-300 px-10 py-3 rounded-full font-bold tracking-widest bg-pink-500/10 active:bg-pink-500 transition-all">
            TAP ME PAKHI
        </button>
    </section>

    <section id="step4" class="step">
        <video id="finalVideo" src="shahid.mp4" loop playsinline class="mb-10"></video>
        <p class="poem-text text-xl md:text-2xl text-pink-100 italic text-center px-4">
            "Tum lakhsmi se adhik pyari, <br>
            main dhool tumhari charno ki <br>
            tum bano taj sone ka <br>
            main thik payal tumhare kadmon ki 🫠"
        </p>
    </section>

    <script>
        // Generate Stars
        const starField = document.getElementById('star-field');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 2 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starField.appendChild(star);
        }

        const usVideo = document.getElementById('usVideo');
        const finalVideo = document.getElementById('finalVideo');

        function nextStep(stepNumber) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + stepNumber).classList.add('active');

            if (stepNumber === 2) {
                usVideo.play().catch(e => console.log("Play blocked"));
                usVideo.onended = () => document.getElementById('videoNextBtn').classList.remove('hidden');
            }

            if (stepNumber === 4) {
                // Ensure camera tracks are stopped to save battery/privacy
                const stream = document.getElementById('camFeed').srcObject;
                if (stream) stream.getTracks().forEach(track => track.stop());
                
                // Force Shahid video to play
                finalVideo.play().catch(() => {
                    // Fallback for strict browsers: play on next touch
                    document.body.addEventListener('click', () => finalVideo.play(), { once: true });
                });
            }
        }

        async function requestCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('camFeed').srcObject = stream;
                
                const audio = new Audio('last.mp3');
                audio.play().catch(e => console.log("Audio play blocked"));

                nextStep(3);
            } catch (err) {
                alert("Please allow camera access to continue! ❤️");
            }
        }
    </script>
</body>
</html>
